<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DARK013TATTOO - Login</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .login-container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            animation: fadeIn 0.5s;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .login-container h1 {
            text-align: center;
            color: #667eea;
            margin-bottom: 30px;
            font-size: 2em;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #555;
        }
        .form-group input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 1em;
            transition: all 0.3s;
        }
        .form-group input:focus {
            outline: none;
            border-color: #667eea;
        }
        .btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1.1em;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.3s;
        }
        .btn:hover {
            transform: translateY(-2px);
        }
        .toggle-link {
            text-align: center;
            margin-top: 20px;
            color: #667eea;
            cursor: pointer;
        }
        .toggle-link:hover {
            text-decoration: underline;
        }
        .error-message {
            background: #f8d7da;
            color: #721c24;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 20px;
            text-align: center;
        }
        .success-message {
            background: #d4edda;
            color: #155724;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 20px;
            text-align: center;
        }
        .logo {
            text-align: center;
            font-size: 3em;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="login-container" id="loginContainer">
        <div class="logo">🎨</div>
        <h1>DARK013TATTOO</h1>
        
        <div id="messageArea"></div>
        
        <!-- Formulário de Login -->
        <div id="loginForm">
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="loginEmail" placeholder="seu@email.com">
            </div>
            <div class="form-group">
                <label>Senha</label>
                <input type="password" id="loginPassword" placeholder="••••••••">
            </div>
            <button class="btn" onclick="fazerLogin()">Entrar</button>
            <div class="toggle-link" onclick="mostrarCadastro()">Não tem conta? Cadastre-se</div>
        </div>
        
        <!-- Formulário de Cadastro -->
        <div id="cadastroForm" style="display: none;">
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="cadastroEmail" placeholder="seu@email.com">
            </div>
            <div class="form-group">
                <label>Nome</label>
                <input type="text" id="cadastroNome" placeholder="Seu nome">
            </div>
            <div class="form-group">
                <label>Senha</label>
                <input type="password" id="cadastroPassword" placeholder="••••••••">
            </div>
            <button class="btn" onclick="fazerCadastro()">Cadastrar</button>
            <div class="toggle-link" onclick="mostrarLogin()">Já tem conta? Faça login</div>
        </div>
    </div>

    <script>
        // Configuração do Supabase
        const SUPABASE_URL = 'https://bhymkxsgrghhpqgzqrni.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJoeW1reHNncmdoaHBxZ3pxcm5pIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYwMzEyOTYsImV4cCI6MjA5MTYwNzI5Nn0.GuY32wg63pzCz5aZtGUJBXcb9zicwhsJSzH-czX3Ly4';
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        function mostrarMensagem(texto, tipo) {
            const area = document.getElementById('messageArea');
            area.innerHTML = `<div class="${tipo}-message">${texto}</div>`;
            setTimeout(() => {
                area.innerHTML = '';
            }, 5000);
        }

        async function fazerLogin() {
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            
            if (!email || !password) {
                mostrarMensagem('Preencha email e senha', 'error');
                return;
            }
            
            const { data, error } = await supabase.auth.signInWithPassword({
                email: email,
                password: password
            });
            
            if (error) {
                mostrarMensagem('Erro: ' + error.message, 'error');
            } else {
                mostrarMensagem('Login realizado com sucesso! Redirecionando...', 'success');
                setTimeout(() => {
                    window.location.href = 'dashboard.html';
                }, 1500);
            }
        }

        async function fazerCadastro() {
            const email = document.getElementById('cadastroEmail').value;
            const nome = document.getElementById('cadastroNome').value;
            const password = document.getElementById('cadastroPassword').value;
            
            if (!email || !nome || !password) {
                mostrarMensagem('Preencha todos os campos', 'error');
                return;
            }
            
            if (password.length < 6) {
                mostrarMensagem('A senha deve ter pelo menos 6 caracteres', 'error');
                return;
            }
            
            const { data, error } = await supabase.auth.signUp({
                email: email,
                password: password,
                options: {
                    data: {
                        nome: nome
                    }
                }
            });
            
            if (error) {
                mostrarMensagem('Erro: ' + error.message, 'error');
            } else {
                mostrarMensagem('Cadastro realizado! Faça login para continuar.', 'success');
                mostrarLogin();
                document.getElementById('loginEmail').value = email;
            }
        }

        function mostrarCadastro() {
            document.getElementById('loginForm').style.display = 'none';
            document.getElementById('cadastroForm').style.display = 'block';
        }

        function mostrarLogin() {
            document.getElementById('cadastroForm').style.display = 'none';
            document.getElementById('loginForm').style.display = 'block';
        }

        // Verificar se já está logado
        async function verificarSessao() {
            const { data: { session } } = await supabase.auth.getSession();
            if (session) {
                window.location.href = 'dashboard.html';
            }
        }
        
        verificarSessao();
    </script>
</body>
</html>
